name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example vX.Y.Z"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build binaries
        run: bun run build:bin

      - name: Generate release notes
        run: bun run release:notes -- --tag "$RELEASE_TAG" --out dist/RELEASE_NOTES.md

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*
          fail_on_unmatched_files: true

  npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify npm version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $package_version."
            echo "Expected tag: $expected_tag"
            exit 1
          fi

      - name: Build npm platform packages
        run: bun run build:npm

      - name: Publish npm packages
        run: |
          set -euo pipefail

          publish_package() {
            local package_dir="$1"
            local package_json="$package_dir/package.json"
            local package_name
            local package_version

            package_name="$(node -p "require(process.argv[1]).name" "$package_json")"
            package_version="$(node -p "require(process.argv[1]).version" "$package_json")"

            if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
              echo "skip ${package_name}@${package_version}: already published"
              return
            fi

            echo "publish ${package_name}@${package_version}"
            npm publish "$package_dir" --access public
          }

          publish_package dist-npm/repo-sweep-darwin-arm64
          publish_package dist-npm/repo-sweep-darwin-x64
          publish_package dist-npm/repo-sweep-linux-x64
          publish_package dist-npm/repo-sweep-linux-arm64
          publish_package dist-npm/repo-sweep-windows-x64
          publish_package .
